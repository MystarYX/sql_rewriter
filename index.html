<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL 字段映射与血缘分析 V2.3</title>
  <link rel="stylesheet" href="./styles.css?v=20260316a" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>SQL 字段映射与血缘分析（V2.3）</h1>
      <p>范围：仅做字段映射、字段血缘与图形展示，不做 SQL 重写与标准字段替换。</p>
    </header>

    <section class="panel">
      <div class="tabs" role="tablist" aria-label="mode">
        <button class="tab active" data-mode="legacy" role="tab" aria-selected="true">旧代码分析</button>
        <button class="tab" data-mode="standard" role="tab" aria-selected="false">标准代码分析</button>
      </div>

      <label for="legacy-input" class="label">旧代码 SQL</label>
      <textarea id="legacy-input" class="sql-input active" placeholder="粘贴 SQL"></textarea>

      <label for="standard-input" class="label hidden">标准代码 SQL</label>
      <textarea id="standard-input" class="sql-input" placeholder="粘贴 SQL"></textarea>

      <div class="btn-row">
        <button id="parse-btn" class="btn primary">解析重构</button>
        <button id="clear-btn" class="btn">清空</button>
        <button id="copy-btn" class="btn">复制字段映射</button>
        <label class="toggle-wrap inline">
          <input id="loose-mode-toggle" type="checkbox" checked />
          宽松模式（未限定字段回填主表别名）
        </label>
      </div>

      <p id="message" class="message" aria-live="polite"></p>
      <pre id="ast-summary" class="ast-summary">AST 摘要：暂无</pre>
    </section>

    <section class="panel result-panel">
      <h2>字段映射清单</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>来源表</th>
              <th>原始字段</th>
              <th>映射字段</th>
              <th>目标表</th>
              <th>注释</th>
            </tr>
          </thead>
          <tbody id="result-body">
            <tr><td colspan="6" class="empty">暂无结果</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel result-panel">
      <h2>字段血缘关系</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>源表</th>
              <th>源字段</th>
              <th>目标表</th>
              <th>目标字段</th>
            </tr>
          </thead>
          <tbody id="lineage-body">
            <tr><td colspan="4" class="empty">暂无血缘</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel result-panel">
      <h2>字段级血缘图</h2>
      <div id="tree-view" class="tree-view">
        <div class="tree-empty">暂无图形数据</div>
      </div>
    </section>

    <section class="panel result-panel">
      <h2>Mermaid 导出</h2>
      <pre id="mermaid-text" class="mermaid-text">graph LR</pre>
    </section>
  </main>

  <script src="./parser.js?v=20260316a"></script>
  <script src="./app.js?v=20260316a"></script>
</body>
</html>
